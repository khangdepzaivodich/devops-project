global:
  # Thời gian chờ resolve alert
  resolve_timeout: 5m
  
  # ── SMTP (Gmail) ── thay bằng email nhóm bạn ──────────────────────
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'devops-alert@gmail.com'
  smtp_auth_username: 'devops-alert@gmail.com'
  smtp_auth_password: 'YOUR_APP_PASSWORD'   # App password Gmail
  smtp_require_tls: true

# Templates
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# ─── Route: phân loại alert ───────────────────────────────────────────
route:
  receiver: 'default-receiver'
  group_by: ['alertname', 'namespace', 'service']
  group_wait: 30s        # Gom alert trong 30s trước khi gửi
  group_interval: 5m     # Gửi lại nếu group có alert mới sau 5m
  repeat_interval: 4h    # Nhắc lại alert chưa resolve sau 4h

  routes:
    # Critical → gửi ngay, lặp lại sau 1h
    - matchers:
        - severity="critical"
      receiver: 'critical-receiver'
      group_wait: 10s
      repeat_interval: 1h

    # Warning → gửi sau 1m
    - matchers:
        - severity="warning"
      receiver: 'warning-receiver'
      group_wait: 1m
      repeat_interval: 4h

# ─── Receivers ────────────────────────────────────────────────────────
receivers:
  - name: 'default-receiver'
    email_configs:
      - to: 'nhom-devops@gmail.com'
        send_resolved: true
        html: '{{ template "email.html" . }}'

  - name: 'critical-receiver'
    email_configs:
      - to: 'nhom-devops@gmail.com'
        send_resolved: true
        subject: '🚨 [CRITICAL] {{ .GroupLabels.alertname }}'
        html: '{{ template "email.html" . }}'
    # Uncomment nếu dùng Microsoft Teams
    # webhook_configs:
    #   - url: 'https://outlook.office.com/webhook/YOUR_TEAMS_WEBHOOK'
    #     send_resolved: true

  - name: 'warning-receiver'
    email_configs:
      - to: 'nhom-devops@gmail.com'
        send_resolved: true
        subject: '⚠️ [WARNING] {{ .GroupLabels.alertname }}'
        html: '{{ template "email.html" . }}'

# ─── Inhibition: tắt warning nếu đã có critical cùng service ─────────
inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ['alertname', 'namespace', 'pod']
