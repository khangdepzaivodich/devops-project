global:
  resolve_timeout: 5m

route:
  receiver: 'discord-receiver'
  group_by: ['alertname', 'namespace', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: 'discord-receiver'
      group_wait: 10s
      repeat_interval: 1h
    - matchers:
        - severity="warning"
      receiver: 'discord-receiver'
      group_wait: 1m
      repeat_interval: 4h

receivers:
  - name: 'discord-receiver'
    webhook_configs:
      - url: 'DISCORD_WEBHOOK_PLACEHOLDER'
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ['alertname', 'namespace', 'pod']