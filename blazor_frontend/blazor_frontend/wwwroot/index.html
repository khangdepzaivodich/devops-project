<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FashionStore</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="blazor_frontend.styles.css" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="flex items-center justify-center h-screen bg-gray-50">
            <div class="flex flex-col items-center gap-4">
                <!-- Tailwind Spinner -->
                <div class="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
                <div class="text-lg font-medium text-gray-600">Loading...</div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui"
        class="fixed bottom-0 left-0 w-full p-4 bg-yellow-100 text-yellow-900 z-50 shadow-lg justify-between items-center"
        style="display: none;">
        <span>An unhandled error has occurred.</span>
        <div>
            <a href="." class="font-bold underline text-blue-600 hover:text-blue-800 mr-4">Reload</a>
            <span class="dismiss cursor-pointer font-bold text-red-600">🗙</span>
        </div>
    </div>
    <script src="_content/CurrieTechnologies.Razor.SweetAlert2/sweetAlert2.min.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script src="js/vietnam-provinces.umd.js"></script>
    <script>
        window.vietnamProvincesData = {
            getProvinces: () => (window.vietnamProvinces?.getProvinces?.() ?? []),
            getDistricts: (provinceCode) => (window.vietnamProvinces?.getDistricts?.(provinceCode) ?? []),
            getWards: (districtCode) => (window.vietnamProvinces?.getWards?.(districtCode) ?? [])
        };

        window.scrollToBottomById = (elementId) => {
            const element = document.getElementById(elementId);
            if (element) {
                element.scrollTop = element.scrollHeight;
                setTimeout(() => { element.scrollTop = element.scrollHeight; }, 50);
                setTimeout(() => { element.scrollTop = element.scrollHeight; }, 150);
            }
        };

        // Fix cho việc nhấn Back không bị nhảy lên đầu trang
        window.addEventListener('popstate', function() {
            if (window.location.pathname.includes('/category') || 
                window.location.pathname.includes('/subcategory') || 
                window.location.pathname.includes('/products')) {
                history.scrollRestoration = 'manual';
            } else {
                history.scrollRestoration = 'auto';
            }
        });
    </script>
</body>

</html>
