apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: catalog-service
        image: __ACR_LOGIN_SERVER__/catalog-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Development"
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: CATALOG_DB
        - name: CloudinarySettings__CloudName
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: CLOUDINARY_CLOUD_NAME
        - name: CloudinarySettings__ApiKey
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: CLOUDINARY_API_KEY
        - name: CloudinarySettings__ApiSecret
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: CLOUDINARY_API_SECRET
        - name: JwtSettings__RsaPublicKey
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: JWT_RSA_PUBLIC_KEY
        - name: FrontendUrl
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: FRONTEND_URL
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
spec:
  selector:
    app: catalog-service
  ports:
  - port: 8080
    targetPort: 8080


