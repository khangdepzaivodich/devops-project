name: CD Pipeline

on:
  workflow_run:
    workflows: ["Backend CI", "Frontend CI"]
    types:
      - completed
    branches: [ "master", "main" ]
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose action: deploy or rollback'
        required: true
        default: 'deploy'
        type: choice
        options:
        - deploy
        - rollback

concurrency:
  group: cd-pipeline
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: CD - Deploy Staging
    runs-on: ubuntu-latest
    environment: 
      name: staging
      url: http://www.test.seriousclothing.huynb.io.vn/
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy') }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Determine changed services
      id: changed_services
      run: |
        ALL_SERVICES="identity-service catalog-service ordering-service basket-service discount-service chat-service frontend"
        SERVICES_TO_RESTART=""
        if ! git diff --quiet HEAD^ HEAD -- "serious/BuildingBlocks" || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          SERVICES_TO_RESTART=$ALL_SERVICES
        else
          for svc in identity-service catalog-service ordering-service basket-service discount-service chat-service; do
            dir_name=$(echo "$svc" | awk -F'-' '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2))} 1' OFS='')
            if ! git diff --quiet HEAD^ HEAD -- "serious/Services/$dir_name"; then
              SERVICES_TO_RESTART="$SERVICES_TO_RESTART $svc"
            fi
          done
          if ! git diff --quiet HEAD^ HEAD -- "blazor_frontend"; then
            SERVICES_TO_RESTART="$SERVICES_TO_RESTART frontend"
          fi
        fi
        SERVICES_TO_RESTART=$(echo $SERVICES_TO_RESTART | xargs)
        echo "SERVICES_TO_RESTART=$SERVICES_TO_RESTART" >> $GITHUB_ENV

    - name: Generate .env file from Secrets
      env:
        IDENTITY_DB: ${{ secrets.IDENTITY_DB }}
        CATALOG_DB: ${{ secrets.CATALOG_DB }}
        ORDERING_DB: ${{ secrets.ORDERING_DB }}
        REDIS_CONNECTION: ${{ secrets.REDIS_CONNECTION }}
        MONGO_CONNECTION: ${{ secrets.MONGO_CONNECTION }}
        MONGO_CONNECTION_ATLAS: ${{ secrets.MONGO_CONNECTION_ATLAS }}
        MONGO_DB_DISCOUNT: ${{ secrets.MONGO_DB_DISCOUNT }}
        MONGO_DB_CHAT: ${{ secrets.MONGO_DB_CHAT }}
        JWT_RSA_PRIVATE_KEY: ${{ secrets.JWT_RSA_PRIVATE_KEY }}
        JWT_RSA_PUBLIC_KEY: ${{ secrets.JWT_RSA_PUBLIC_KEY }}
        SMTP_HOST: ${{ secrets.SMTP_HOST }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        SMTP_FROM: ${{ secrets.SMTP_FROM }}
        SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
        CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
        CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
        CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        FRONTEND_URL: http://www.test.seriousclothing.huynb.io.vn/
      run: |
        cat <<EOF > .env.deploy
        IDENTITY_DB=$IDENTITY_DB
        CATALOG_DB=$CATALOG_DB
        ORDERING_DB=$ORDERING_DB
        REDIS_CONNECTION=$REDIS_CONNECTION
        MONGO_CONNECTION=$MONGO_CONNECTION
        MONGO_CONNECTION_ATLAS=$MONGO_CONNECTION_ATLAS
        MONGO_DB_DISCOUNT=$MONGO_DB_DISCOUNT
        MONGO_DB_CHAT=$MONGO_DB_CHAT
        JWT_RSA_PRIVATE_KEY=$JWT_RSA_PRIVATE_KEY
        JWT_RSA_PUBLIC_KEY=$JWT_RSA_PUBLIC_KEY
        SMTP_HOST=$SMTP_HOST
        SMTP_PORT=$SMTP_PORT
        SMTP_USERNAME=$SMTP_USERNAME
        SMTP_PASSWORD=$SMTP_PASSWORD
        SMTP_FROM=$SMTP_FROM
        SMTP_FROM_NAME=$SMTP_FROM_NAME
        CLOUDINARY_CLOUD_NAME=$CLOUDINARY_CLOUD_NAME
        CLOUDINARY_API_KEY=$CLOUDINARY_API_KEY
        CLOUDINARY_API_SECRET=$CLOUDINARY_API_SECRET
        FRONTEND_URL=$FRONTEND_URL
        EOF

    - name: Copy K8s Manifests and .env to Azure VM (Staging)
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.AZURE_VM_HOST }}
        username: ${{ secrets.AZURE_VM_USERNAME }}
        key: ${{ secrets.AZURE_VM_SSH_KEY }}
        source: "k8s/*,.env.deploy"
        target: "~/deploy-staging/"

    - name: Deploy to K3s Staging via SSH
      uses: appleboy/ssh-action@v1.0.3
      env:
        SERVICES_TO_RESTART: ${{ env.SERVICES_TO_RESTART }}
      with:
        envs: SERVICES_TO_RESTART
        host: ${{ secrets.AZURE_VM_HOST }}
        username: ${{ secrets.AZURE_VM_USERNAME }}
        key: ${{ secrets.AZURE_VM_SSH_KEY }}
        script: |
          # Fix K3s permission issue for azureuser
          sudo chmod 644 /etc/rancher/k3s/k3s.yaml || true
          
          # Create staging namespace if not exists
          kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f -
          
          # Create ACR Image Pull Secret so K8s can pull the image
          kubectl create secret docker-registry acr-secret \
            --docker-server=${{ secrets.ACR_LOGIN_SERVER }} \
            --docker-username=${{ secrets.ACR_USERNAME }} \
            --docker-password=${{ secrets.ACR_PASSWORD }} \
            --namespace=staging \
            --dry-run=client -o yaml | kubectl apply -f -
          
          cd ~/deploy-staging/k8s
          
          # Replace image placeholders with actual ACR server
          find . -type f -name "*.yaml" -exec sed -i "s|__ACR_LOGIN_SERVER__|${{ secrets.ACR_LOGIN_SERVER }}|g" {} +
          
          # Apply configs, backend, frontend and ingress manifests
          kubectl apply -f config/ -n staging
          
          # Create app-secrets from the dynamically generated .env file
          kubectl create secret generic app-secrets --from-env-file=../.env.deploy -n staging --dry-run=client -o yaml | kubectl apply -f -
          
          kubectl apply -f backend/ -n staging
          kubectl apply -f frontend/ -n staging
          kubectl apply -f ingress/ -n staging
          
          # Force restart ONLY changed deployments
          if [ -n "$SERVICES_TO_RESTART" ]; then
            for svc in $SERVICES_TO_RESTART; do
              kubectl rollout restart deployment/$svc -n staging
            done
            
            # Check rollout status for changed deployments
            for svc in $SERVICES_TO_RESTART; do
              kubectl rollout status deployment/$svc -n staging
            done
          else
            echo "No services to restart."
          fi
          
          # Remove the temporary .env file from the server for security
          rm -f ~/deploy-staging/.env.deploy

    - name: Discord Notification
      if: always()
      uses: sarisia/actions-status-discord@v1
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        status: ${{ job.status }}
        title: "CD Deployment Status (Staging)"
        description: "Deployment completed for environment Staging.\n🌐 **URL:** http://www.test.seriousclothing.huynb.io.vn/"
        color: 0xffff00


          
  deploy-production:
    name: CD - Deploy Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: 
      name: production
      url: http://www.seriousclothing.huynb.io.vn/
      # Note: Manual approval should be enabled in GitHub Settings -> Environments -> production
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy') }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Determine changed services
      id: changed_services
      run: |
        ALL_SERVICES="identity-service catalog-service ordering-service basket-service discount-service chat-service frontend"
        SERVICES_TO_RESTART=""
        if ! git diff --quiet HEAD^ HEAD -- "serious/BuildingBlocks" || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          SERVICES_TO_RESTART=$ALL_SERVICES
        else
          for svc in identity-service catalog-service ordering-service basket-service discount-service chat-service; do
            dir_name=$(echo "$svc" | awk -F'-' '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2))} 1' OFS='')
            if ! git diff --quiet HEAD^ HEAD -- "serious/Services/$dir_name"; then
              SERVICES_TO_RESTART="$SERVICES_TO_RESTART $svc"
            fi
          done
          if ! git diff --quiet HEAD^ HEAD -- "blazor_frontend"; then
            SERVICES_TO_RESTART="$SERVICES_TO_RESTART frontend"
          fi
        fi
        SERVICES_TO_RESTART=$(echo $SERVICES_TO_RESTART | xargs)
        echo "SERVICES_TO_RESTART=$SERVICES_TO_RESTART" >> $GITHUB_ENV

    - name: Generate .env file from Secrets
      env:
        IDENTITY_DB: ${{ secrets.IDENTITY_DB }}
        CATALOG_DB: ${{ secrets.CATALOG_DB }}
        ORDERING_DB: ${{ secrets.ORDERING_DB }}
        REDIS_CONNECTION: ${{ secrets.REDIS_CONNECTION }}
        MONGO_CONNECTION: ${{ secrets.MONGO_CONNECTION }}
        MONGO_CONNECTION_ATLAS: ${{ secrets.MONGO_CONNECTION_ATLAS }}
        MONGO_DB_DISCOUNT: ${{ secrets.MONGO_DB_DISCOUNT }}
        MONGO_DB_CHAT: ${{ secrets.MONGO_DB_CHAT }}
        JWT_RSA_PRIVATE_KEY: ${{ secrets.JWT_RSA_PRIVATE_KEY }}
        JWT_RSA_PUBLIC_KEY: ${{ secrets.JWT_RSA_PUBLIC_KEY }}
        SMTP_HOST: ${{ secrets.SMTP_HOST }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        SMTP_FROM: ${{ secrets.SMTP_FROM }}
        SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
        CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
        CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
        CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        FRONTEND_URL: http://www.seriousclothing.huynb.io.vn/
      run: |
        cat <<EOF > .env.deploy
        IDENTITY_DB=$IDENTITY_DB
        CATALOG_DB=$CATALOG_DB
        ORDERING_DB=$ORDERING_DB
        REDIS_CONNECTION=$REDIS_CONNECTION
        MONGO_CONNECTION=$MONGO_CONNECTION
        MONGO_CONNECTION_ATLAS=$MONGO_CONNECTION_ATLAS
        MONGO_DB_DISCOUNT=$MONGO_DB_DISCOUNT
        MONGO_DB_CHAT=$MONGO_DB_CHAT
        JWT_RSA_PRIVATE_KEY=$JWT_RSA_PRIVATE_KEY
        JWT_RSA_PUBLIC_KEY=$JWT_RSA_PUBLIC_KEY
        SMTP_HOST=$SMTP_HOST
        SMTP_PORT=$SMTP_PORT
        SMTP_USERNAME=$SMTP_USERNAME
        SMTP_PASSWORD=$SMTP_PASSWORD
        SMTP_FROM=$SMTP_FROM
        SMTP_FROM_NAME=$SMTP_FROM_NAME
        CLOUDINARY_CLOUD_NAME=$CLOUDINARY_CLOUD_NAME
        CLOUDINARY_API_KEY=$CLOUDINARY_API_KEY
        CLOUDINARY_API_SECRET=$CLOUDINARY_API_SECRET
        FRONTEND_URL=$FRONTEND_URL
        EOF

    - name: Copy K8s Manifests and .env to Azure VM (Production)
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.AZURE_VM_HOST }}
        username: ${{ secrets.AZURE_VM_USERNAME }}
        key: ${{ secrets.AZURE_VM_SSH_KEY }}
        source: "k8s/*,.env.deploy"
        target: "~/deploy-production/"

    - name: Deploy to K3s Production via SSH
      uses: appleboy/ssh-action@v1.0.3
      env:
        SERVICES_TO_RESTART: ${{ env.SERVICES_TO_RESTART }}
      with:
        envs: SERVICES_TO_RESTART
        host: ${{ secrets.AZURE_VM_HOST }}
        username: ${{ secrets.AZURE_VM_USERNAME }}
        key: ${{ secrets.AZURE_VM_SSH_KEY }}
        script: |
          # Fix K3s permission issue for azureuser
          sudo chmod 644 /etc/rancher/k3s/k3s.yaml || true
          
          # Create production namespace if not exists
          kubectl create namespace production --dry-run=client -o yaml | kubectl apply -f -
          
          # Create ACR Image Pull Secret so K8s can pull the image
          kubectl create secret docker-registry acr-secret \
            --docker-server=${{ secrets.ACR_LOGIN_SERVER }} \
            --docker-username=${{ secrets.ACR_USERNAME }} \
            --docker-password=${{ secrets.ACR_PASSWORD }} \
            --namespace=production \
            --dry-run=client -o yaml | kubectl apply -f -
          
          cd ~/deploy-production/k8s
          
          # Replace image placeholders with actual ACR server
          find . -type f -name "*.yaml" -exec sed -i "s|__ACR_LOGIN_SERVER__|${{ secrets.ACR_LOGIN_SERVER }}|g" {} +
          
          # Apply configs, backend, frontend and ingress manifests
          kubectl apply -f config/ -n production
          
          # Create app-secrets from the dynamically generated .env file
          kubectl create secret generic app-secrets --from-env-file=../.env.deploy -n production --dry-run=client -o yaml | kubectl apply -f -
          
          kubectl apply -f backend/ -n production
          kubectl apply -f frontend/ -n production
          kubectl apply -f ingress/ -n production
          
          # Force restart ONLY changed deployments
          if [ -n "$SERVICES_TO_RESTART" ]; then
            for svc in $SERVICES_TO_RESTART; do
              kubectl rollout restart deployment/$svc -n production
            done
            
            # Check rollout status for changed deployments
            for svc in $SERVICES_TO_RESTART; do
              kubectl rollout status deployment/$svc -n production
            done
          else
            echo "No services to restart."
          fi
          
          # Remove the temporary .env file from the server for security
          rm -f ~/deploy-production/.env.deploy

    - name: Discord Notification
      if: always()
      uses: sarisia/actions-status-discord@v1
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        status: ${{ job.status }}
        title: "CD Deployment Status"
        description: "Deployment completed for environment Production.\n🌐 **URL:** http://www.seriousclothing.huynb.io.vn/"
        color: 0xff00ff



  rollback-production:
    name: Rollback Production
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'rollback' }}
    
    steps:
    - name: Rollback Kubernetes Deployments via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AZURE_VM_HOST }}
        username: ${{ secrets.AZURE_VM_USERNAME }}
        key: ${{ secrets.AZURE_VM_SSH_KEY }}
        script: |
          # Fix K3s permission issue for azureuser
          sudo chmod 644 /etc/rancher/k3s/k3s.yaml || true
          
          echo "Rolling back production deployments..."
          for svc in identity-service catalog-service ordering-service basket-service discount-service chat-service frontend; do
            kubectl rollout undo deployment/$svc -n production
          done
  
