name: Frontend CI

on:
  push:
    branches: [ "master", "main" ]
    paths:
      - 'blazor_frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ "master", "main" ]
    paths:
      - 'blazor_frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: blazor_frontend/blazor_frontend

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'zulu'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'blazor_frontend/blazor_frontend/package-lock.json'

    - name: Install npm dependencies
      run: npm ci

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Cache SonarCloud packages
      uses: actions/cache@v4
      with:
        path: ~/sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Install SonarQube scanner
      run: dotnet tool install --global dotnet-sonarscanner

    - name: Restore dependencies
      run: dotnet restore ../blazor_frontend.slnx

    - name: Begin SonarQube Analysis
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        SONAR_ORG_ARG=""
        if [ ! -z "${{ secrets.SONAR_ORGANIZATION }}" ]; then
          SONAR_ORG_ARG="/o:${{ secrets.SONAR_ORGANIZATION }}"
        fi
        
        SONAR_HOST="${{ secrets.SONAR_HOST_URL }}"
        if [ -z "$SONAR_HOST" ]; then
          SONAR_HOST="https://sonarcloud.io"
        fi

        dotnet-sonarscanner begin /k:"${{ secrets.SONAR_PROJECT_KEY_FRONTEND || 'blazor-frontend' }}" \
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
          /d:sonar.host.url="$SONAR_HOST" \
          $SONAR_ORG_ARG \
          /d:sonar.exclusions="**/bin/**/*,**/obj/**/*,**/wwwroot/lib/**/*,**/wwwroot/js/vietnam-provinces.umd.js" \
          /d:sonar.coverage.exclusions="**/*" \
          /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml"

    - name: Build
      run: dotnet build ../blazor_frontend.slnx --no-restore

    - name: End SonarQube Analysis
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Azure Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and push Frontend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./blazor_frontend
        file: ./blazor_frontend/Dockerfile.frontend
        push: true
        tags: ${{ secrets.ACR_LOGIN_SERVER }}/frontend:${{ github.sha }},${{ secrets.ACR_LOGIN_SERVER }}/frontend:latest

    - name: Discord Notification
      if: always()
      uses: sarisia/actions-status-discord@v1
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        status: ${{ job.status }}
        title: "Frontend Build Status"
        description: "Build completed for branch ${{ github.ref_name }}"
        color: 0x00ff00
