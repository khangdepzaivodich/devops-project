name: Frontend CI

on:
  push:
    branches: [ "master", "main" ]
    paths:
      - 'blazor_frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ "master", "main" ]
    paths:
      - 'blazor_frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: blazor_frontend/blazor_frontend

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'blazor_frontend/blazor_frontend/package-lock.json'

    - name: Install npm dependencies
      run: npm ci

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore ../blazor_frontend.slnx

    - name: Build
      run: dotnet build ../blazor_frontend.slnx --no-restore

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Azure Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and push Frontend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./blazor_frontend
        file: ./blazor_frontend/Dockerfile.frontend
        push: true
        tags: ${{ secrets.ACR_LOGIN_SERVER }}/frontend:${{ github.sha }},${{ secrets.ACR_LOGIN_SERVER }}/frontend:latest

    - name: Discord Notification
      if: always()
      uses: sarisia/actions-status-discord@v1
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        status: ${{ job.status }}
        title: "Frontend Build Status"
        description: "Build completed for branch ${{ github.ref_name }}"
        color: 0x00ff00
