name: Backend CI

on:
  push:
    branches: [ "master", "main" ]
    paths:
      - 'serious/**'
      - '.github/workflows/dotnet-ci.yml'
  pull_request:
    branches: [ "master", "main" ]
    paths:
      - 'serious/**'
      - '.github/workflows/dotnet-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: serious

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'zulu'
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Cache SonarCloud packages
      uses: actions/cache@v4
      with:
        path: ~/sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Install SonarQube scanner
      run: dotnet tool install --global dotnet-sonarscanner

    - name: Restore dependencies
      run: dotnet restore serious.slnx

    - name: Begin SonarQube Analysis
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        SONAR_ORG_ARG=""
        if [ ! -z "${{ secrets.SONAR_ORGANIZATION }}" ]; then
          SONAR_ORG_ARG="/o:${{ secrets.SONAR_ORGANIZATION }}"
        fi
        
        SONAR_HOST="${{ secrets.SONAR_HOST_URL }}"
        if [ -z "$SONAR_HOST" ]; then
          SONAR_HOST="https://sonarcloud.io"
        fi

        dotnet-sonarscanner begin /k:"${{ secrets.SONAR_PROJECT_KEY_BACKEND || 'serious' }}" \
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
          /d:sonar.host.url="$SONAR_HOST" \
          $SONAR_ORG_ARG \
          /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml"\
          /d:sonar.cpd.exclusions="**/Program.cs" \
          /d:sonar.coverage.exclusions="**/Program.cs"
    - name: Build
      run: dotnet build serious.slnx --no-restore

    - name: Test
      run: dotnet test serious.slnx --no-build --verbosity normal --logger "console;verbosity=normal" --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

    - name: End SonarQube Analysis
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Azure Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and push all Microservices
      run: |
        # Loop through all subdirectories in the Services folder
        for dir in Services/*/; do
          # Check if Dockerfile exists in this directory, skip if not (e.g., skip .Tests projects)
          if [ ! -f "${dir}Dockerfile" ]; then
            echo "Skipping $dir (No Dockerfile found)"
            continue
          fi
          
          # Extract directory name (e.g., IdentityService)
          service_name=$(basename "$dir")
          
          # Convert PascalCase to kebab-case (e.g., IdentityService -> identity-service)
          service_kebab=$(echo "$service_name" | sed -r 's/([a-z0-9])([A-Z])/\1-\2/g' | tr '[:upper:]' '[:lower:]')
          
          echo "Building image for $service_kebab from $dir..."
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/$service_kebab:${{ github.sha }} -t ${{ secrets.ACR_LOGIN_SERVER }}/$service_kebab:latest "$dir"
          
          echo "Pushing $service_kebab..."
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/$service_kebab:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/$service_kebab:latest
        done

    - name: Discord Notification
      if: always()
      uses: sarisia/actions-status-discord@v1
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        status: ${{ job.status }}
        title: "Backend Build Status"
        description: "Build completed for branch ${{ github.ref_name }}"
        color: 0x0000ff
